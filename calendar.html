<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Myles CRM — Calendar</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header>
      <h1>Calendar (Prototype)</h1>
<nav>
        <a href="index.html">Home</a>
        <a href="notes.html">Notes</a>
        <a href="contacts.html">Contacts</a>
        <a href="calendar.html" class="active">Calendar</a>
      </nav>
    </header>
    <main>
      <section class="card">
        <p>Reads events from Supabase. (Add via Buddy/API for now)</p>
        <div class="row">
          <input id="eventTitle" placeholder="Cloud-read enabled (add via Buddy/API)" />
          <input id="eventDate" type="date" />
          <button id="addEvent" disabled>Add Event</button>
        </div>
        <ul id="events" class="list"></ul>
      </section>
</main>
    <footer>
      <small>Cloud data via Supabase.</small>
    </footer>

    <!-- START: Supabase config (set your values) -->
    <script>
      window.SUPABASE_URL = 'PASTE_YOUR_SUPABASE_URL_HERE';
      window.SUPABASE_ANON = 'PASTE_YOUR_ANON_PUBLIC_KEY_HERE';
    </script>
    <!-- END: Supabase config -->

    <script src="assets/common.js"></script>

    <!-- START: Calendar cloud script -->
    <script>
      const eventsEl = document.getElementById('events');
function renderLocalFallback(){
        eventsEl.innerHTML = '<li>(No cloud data yet)</li>';
      }

      async function renderCloud(){
        if (!window.supabase) { renderLocalFallback(); return; }
        const { data, error } = await window.supabase
          .from('events')
          .select('*')
          .is('deleted_at', null)
          .order('date', { ascending: true });
        if (error) { console.warn(error); renderLocalFallback(); return; }
        eventsEl.innerHTML='';
        data.forEach((ev)=>{
          const li=document.createElement('li');
          const when = ev.time ? ${ev.date} ${ev.time} : ev.date;
          li.textContent = ${ev.title} — ${when};
eventsEl.appendChild(li);
        });
      }

      renderCloud();
    </script>
    <!-- END: Calendar cloud script -->
  </body>
</html>
