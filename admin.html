<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Myles CRM</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 20px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 12px 0; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    label { display: block; font-weight: 600; margin-top: 8px; }
    input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 10px 14px; border-radius: 6px; border: 0; background: #0b5; color: #fff; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .tabs button { background: #eee; color: #333; }
    .tabs .active { background: #0b5; color: #fff; }
    .hidden { display: none; }
    .msg { margin-top: 8px; font-size: 14px; }
    .error { color: #c00; }
    .ok { color: #070; }
  </style>
</head>
<body>
  <h1>Myles CRM — Admin</h1>

  <div class="card">
    <label for="passcode">Passcode</label>
    <input id="passcode" type="password" placeholder="Enter admin passcode" />
    <button id="savePass">Save for this session</button>
    <div id="authMsg" class="msg"></div>
  </div>

  <div class="tabs row">
    <button data-tab="notes" class="active">Add Note</button>
    <button data-tab="contacts">Add Contact</button>
    <button data-tab="events">Add Event</button>
  </div>

  <div id="tab-notes" class="card">
    <label>Topic</label>
    <select id="noteTopic">
      <option value="guitar">Guitar</option>
      <option value="trumpet">Trumpet</option>
      <option value="bass">Bass</option>
      <option value="drums">Drums</option>
      <option value="piano">Piano</option>
      <option value="general">General</option>
    </select>
    <label>Body</label>
    <textarea id="noteBody" rows="4" placeholder="Write note..."></textarea>
    <button id="sendNote">Save Note</button>
    <div id="noteMsg" class="msg"></div>
  </div>

  <div id="tab-contacts" class="card hidden">
    <div class="row">
      <div style="flex:1">
        <label>First name</label>
        <input id="cFirst" />
      </div>
      <div style="flex:1">
        <label>Last name</label>
        <input id="cLast" />
      </div>
    </div>
    <label>Email</label>
    <input id="cEmail" />
    <label>Phone</label>
    <input id="cPhone" />
    <label>Address</label>
    <input id="cAddr" />
    <label>Profession</label>
    <input id="cProf" />
    <label>Notes</label>
    <textarea id="cNotes" rows="3"></textarea>
    <button id="sendContact">Save Contact</button>
    <div id="contactMsg" class="msg"></div>
  </div>

  <div id="tab-events" class="card hidden">
    <label>Title</label>
    <input id="eTitle" />
    <div class="row">
      <div style="flex:1">
        <label>Date</label>
        <input id="eDate" type="date" />
      </div>
      <div style="flex:1">
        <label>Time</label>
        <input id="eTime" type="time" />
      </div>
    </div>
    <label>Location</label>
    <input id="eLoc" />
    <button id="sendEvent">Save Event</button>
    <div id="eventMsg" class="msg"></div>
  </div>

  <script>
    const qs = (s) => document.querySelector(s);
    const show = (el, vis) => el.classList.toggle('hidden', !vis);

    // Tabs
    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        show(qs('#tab-notes'), tab === 'notes');
        show(qs('#tab-contacts'), tab === 'contacts');
        show(qs('#tab-events'), tab === 'events');
      });
    });

    // Passcode storage (localStorage per instructions)
    const PASS_KEY = 'crm_admin_passcode';
    const setPass = (val) => localStorage.setItem(PASS_KEY, val || '');
    const getPass = () => localStorage.getItem(PASS_KEY) || '';

    qs('#savePass').addEventListener('click', () => {
      setPass(qs('#passcode').value.trim());
      qs('#authMsg').textContent = getPass() ? 'Passcode saved for this session.' : 'Cleared passcode.';
    });

    // Helpers
    async function post(path, body, msgEl) {
      const pass = getPass();
      if (!pass) {
        msgEl.textContent = 'Enter and save passcode first.';
        msgEl.className = 'msg error';
        return;
      }
      msgEl.textContent = 'Saving...';
      msgEl.className = 'msg';
      try {
        const res = await fetch(path, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + pass,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = { raw: text }; }
        if (!res.ok) throw new Error((data && data.error) || res.statusText);
        msgEl.textContent = 'Saved ✅';
        msgEl.className = 'msg ok';
      } catch (e) {
        msgEl.textContent = 'Error: ' + (e.message || 'request failed');
        msgEl.className = 'msg error';
      }
    }

    // Note
    qs('#sendNote').addEventListener('click', () => {
      post('/admin/notes', {
        category: qs('#noteTopic').value,
        content: qs('#noteBody').value.trim()
      }, qs('#noteMsg'));
    });

    // Contact
    qs('#sendContact').addEventListener('click', () => {
      post('/admin/contacts', {
        first_name: qs('#cFirst').value.trim(),
        last_name: qs('#cLast').value.trim(),
        email: qs('#cEmail').value.trim(),
        phone: qs('#cPhone').value.trim(),
        address: qs('#cAddr').value.trim(),
        profession: qs('#cProf').value.trim(),
        notes: qs('#cNotes').value.trim()
      }, qs('#contactMsg'));
    });

    // Event
    qs('#sendEvent').addEventListener('click', () => {
      post('/admin/events', {
        title: qs('#eTitle').value.trim(),
        date: qs('#eDate').value,
        time: qs('#eTime').value,
        location: qs('#eLoc').value.trim()
      }, qs('#eventMsg'));
    });
  </script>
</body>
</html>
