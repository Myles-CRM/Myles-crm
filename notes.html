<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Myles CRM — Notes</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header>
      <h1>Notes & Reminders</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="notes.html" class="active">Notes</a>
        <a href="contacts.html">Contacts</a>
        <a href="calendar.html">Calendar</a>
      </nav>
    </header>
    <main>
      <div class="tabs">
        <button class="tab active" data-tab="guitar">Guitar</button>
        <button class="tab" data-tab="trumpet">Trumpet</button>
<button class="tab" data-tab="bass">Bass</button>
        <button class="tab" data-tab="drums">Drums</button>
        <button class="tab" data-tab="piano">Piano</button>
        <button class="tab" data-tab="general">General</button>
      </div>
      <section>
        <textarea id="notesArea" rows="12" placeholder="Cloud-read enabled (add via Buddy/API)"></textarea>
        <div class="row">
          <button id="saveNotes" disabled>Save Notes</button>
          <span id="status"></span>
        </div>
      </section>
    </main>
    <footer>
      <small>Cloud data via Supabase.</small>
    </footer>
<!-- START: Supabase config (set your values) -->
    <script>
      window.SUPABASE_URL = 'PASTE_YOUR_SUPABASE_URL_HERE';
      window.SUPABASE_ANON = 'PASTE_YOUR_ANON_PUBLIC_KEY_HERE';
    </script>
    <!-- END: Supabase config -->

    <script src="assets/common.js"></script>

    <!-- START: Notes cloud script -->
    <script>
      const tabs = document.querySelectorAll('.tab');
      const notesArea = document.getElementById('notesArea');
      const statusEl = document.getElementById('status');
      let currentTab = 'guitar';

      async function loadCloud(tab){
if (!window.supabase) {
          statusEl.textContent = 'Cloud not set.';
          notesArea.value = '';
          return;
        }
        const { data, error } = await window.supabase
          .from('notes')
          .select('*')
          .eq('category', tab)
          .is('deleted_at', null)
          .order('created_at', { ascending: true });
        if (error) {
          statusEl.textContent = 'Cloud error.';
          notesArea.value = '';
          return;
        }
        const latest = data.length ? data[data.length-1].content : '';
notesArea.value = latest;
        statusEl.textContent = Loaded ${tab} notes (${data.length}).;
      }

      tabs.forEach(t=>t.addEventListener('click', ()=>{
        currentTab = t.dataset.tab;
        tabs.forEach(x=>x.classList.toggle('active', x===t));
        loadCloud(currentTab);
      }));

      loadCloud(currentTab);
    </script>
    <!-- END: Notes cloud script -->
  </body>
</html>
