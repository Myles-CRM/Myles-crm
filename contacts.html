<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Myles CRM — Contacts</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header>
      <h1>Contacts</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="notes.html">Notes</a>
        <a href="contacts.html" class="active">Contacts</a>
        <a href="calendar.html">Calendar</a>
</nav>
    </header>
    <main>
      <form id="contactForm" class="card">
        <div class="grid">
          <label>First Name<input name="first_name" required></label>
          <label>Last Name<input name="last_name" required></label>
          <label>Phone Number<input name="phone" type="tel"></label>
          <label>Address<input name="address"></label>
          <label>Email<input name="email" type="email"></label>
          <label>Profession<input name="profession"></label>
        </div>
        <label>Notes<textarea name="notes" rows="4"></textarea></label>
        <button type="submit" disabled>Add Contact</button>
        <span id="formStatus"></span>
      </form>
<section class="card">
        <h2>Saved Contacts</h2>
        <input id="search" placeholder="Search by name or email" />
        <ul id="list" class="list"></ul>
      </section>
    </main>
    <footer>
      <small>Cloud data via Supabase.</small>
    </footer>

    <!-- START: Supabase config (set your values) -->
    <script>
      window.SUPABASE_URL = 'PASTE_YOUR_SUPABASE_URL_HERE';
      window.SUPABASE_ANON = 'PASTE_YOUR_ANON_PUBLIC_KEY_HERE';
    </script>
    <!-- END: Supabase config -->
<script src="assets/common.js"></script>

    <!-- START: Contacts cloud script -->
    <script>
      const list=document.getElementById('list');
      const search=document.getElementById('search');

      async function renderCloud(filter=''){
        if (!window.supabase) { list.innerHTML = '<li>Cloud not set.</li>'; return; }
        const { data, error } = await window.supabase
          .from('contacts')
          .select('*')
          .is('deleted_at', null)
          .order('created_at', { ascending: true });
        if (error) { list.innerHTML = <li>Cloud error: ${error.message}</li>; return; }

        const q=filter.toLowerCase();
list.innerHTML='';
        data
          .filter(c=>${c.first_name} ${c.last_name} ${c.email||''}.toLowerCase().includes(q))
          .forEach((c)=>{
            const li=document.createElement('li');
            li.innerHTML=<strong>${c.first_name} ${c.last_name}</strong><br>
              ${c.email||''} ${c.phone? ' • '+c.phone: ''}<br>
              ${c.address||''} ${c.profession? ' • '+c.profession: ''}<br>
              <em>${c.notes||''}</em>;
            list.appendChild(li);
          });
      }

      search.addEventListener('input', ()=>renderCloud(search.value));
      renderCloud();
    </script>
    <!-- END: Contacts cloud script -->
</body>
</html>
