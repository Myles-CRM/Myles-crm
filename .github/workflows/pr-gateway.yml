name: PR Gateway

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name for PR (e.g., feature/add-event-button)'
        required: true
      file_path:
        description: 'Path to create/update (e.g., test-gateway.txt)'
        required: true
      text:
        description: 'Text to write into the file'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write file
        run: |
          git config user.name "Myles-Andy-bot"
          git config user.email "tacotrumpet001+andy@gmail.com"
          git checkout -b "${{ github.event.inputs.branch }}"
          mkdir -p "$(dirname "${{ github.event.inputs.file_path }}")"
          printf '%s\n' "${{ github.event.inputs.text }}" > "${{ github.event.inputs.file_path }}"
          git add -A
          git commit -m "Gateway write: ${{ github.event.inputs.file_path }}"
          git push -u origin "${{ github.event.inputs.branch }}"

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          branch: ${{ github.event.inputs.branch }}
          title: "Gateway: ${{ github.event.inputs.file_path }}"
          base: main
          body: "Automated PR via PR Gateway."
